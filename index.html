<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Task Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>My Task Board</h1>
  <span id="taskCounter">0 Tasks</span>

  <select id="filterPriority">
    <option value="all">All</option>
    <option value="low">Low</option>
    <option value="medium">Medium</option>
    <option value="high">High</option>
  </select>
</header>

<main class="board">

  <section id="todo">
    <h2>To Do</h2>
    <ul></ul>
    <button class="addBtn" data-column="todo">Add Task</button>
  </section>

  <section id="inprogress">
    <h2>In Progress</h2>
    <ul></ul>
    <button class="addBtn" data-column="inprogress">Add Task</button>
  </section>

  <section id="done">
    <h2>Done</h2>
    <ul></ul>
    <button class="addBtn" data-column="done">Add Task</button>
    <button id="clearDone">Clear All</button>
  </section>

</main>

<div id="taskModal" class="hidden">
  <div class="modal-content">
    <h3>Task</h3>

    <input type="text" id="taskTitle" placeholder="Title">
    <textarea id="taskDesc" placeholder="Description"></textarea>

    <select id="taskPriority">
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>

    <input type="date" id="taskDate">

    <button id="saveTask">Save</button>
    <button id="cancelTask">Cancel</button>
  </div>
</div>

<script src="taskmanager.js"></script>
</body>
</html>
